# The ArgoCD Application for the S3 composition, XRD, and claims
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-s3-composition
  namespace: argocd
  labels:
    crossplane.matdavey.io: infrastructure
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/matdavey/crossplane-argocd
    targetRevision: HEAD
    path: infrastructure/s3-composition
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
